syntax = "proto2";
package bbdown;
option go_package = "bbdown-go/internal/pb;pb";

message Locale {
    message LocaleIds {
        optional string language = 1;
        optional string script = 2;
        optional string region = 3;
    }
    optional LocaleIds cLocale = 1;
    optional LocaleIds sLocale = 2;
}